name: Deploy Minecraft Only

on:
  workflow_dispatch:

jobs:
  deploy-minecraft:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Minecraft services on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "== Pull latest code from GitHub =="
            git fetch origin main
            git reset --hard origin/main

            echo "== Fix script permissions =="
            find scripts -type f -name "*.sh" -exec chmod +x {} \;

            echo "== Check docker compose config =="
            docker compose config >/dev/null

            echo "== Sync server configs =="
            bash ./scripts/lifecycle/sync-server-properties.sh
            bash ./scripts/lifecycle/sync-proxy-forwarding.sh

            echo "== Restart Minecraft services only =="
            docker compose up -d --no-deps --force-recreate \
              velocity \
              hub \
              island1 \
              island2 \
              island3 \
              island4

            echo "== Current containers =="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "== Cleanup unused Docker images =="
            docker image prune -f

            echo "== Done =="
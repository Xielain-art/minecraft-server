name: Restart Minecraft Services

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      - name: Restart Minecraft services on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "== Fix script permissions =="
            find scripts -type f -name "*.sh" -exec chmod +x {} \;

            echo "== Sync server config =="
            bash ./scripts/lifecycle/sync-server-properties.sh
            bash ./scripts/lifecycle/sync-proxy-forwarding.sh

            echo "== Restart Minecraft services only =="
            docker compose restart \
              velocity \
              hub \
              island1 \
              island2 \
              island3 \
              island4

            echo "== Current containers =="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "== Done =="
theme: auto

server:
  address: tcp://0.0.0.0:9091

log:
  level: info

totp:
  issuer: Gerbarium

identity_validation:
  reset_password:
    jwt_secret: ${AUTHELIA_JWT_SECRET}

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2

access_control:
  default_policy: deny
  rules:
    - domain: ${SCHEMATICS_DOMAIN}
      policy: one_factor
      subject:
        - "group:builders"
        - "group:admins"

session:
  name: gerbarium_session
  secret: ${AUTHELIA_SESSION_SECRET}
  expiration: 12h
  inactivity: 2h
  cookies:
    - domain: ${PUBLIC_DOMAIN}
      authelia_url: https://${AUTH_DOMAIN}
      default_redirection_url: https://${SCHEMATICS_DOMAIN}

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 15m

storage:
  encryption_key: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
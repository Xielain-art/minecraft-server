services:
  velocity:
    image: itzg/bungeecord
    container_name: mc-velocity
    restart: unless-stopped
    ports:
      - "${VELOCITY_PORT}:25577"
      # Optional debug only (prefer access via Caddy -> velocity:25576):
      # - "25576:25576"
    environment:
      - TYPE=VELOCITY
      - MEMORY=${VELOCITY_MEMORY}
      - VELOCITY_VERSION=${VELOCITY_VERSION}
    volumes:
      - ./velocity:/server
    networks:
      - mc-network
    depends_on:
      - hub
      - island1
      - island2
      - island3
      - island4

  hub:
    image: itzg/minecraft-server:java17
    container_name: mc-hub
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FABRIC
      - VERSION=${MC_VERSION}
      - MEMORY=${HUB_MEMORY}
      - ONLINE_MODE=${MC_ONLINE_MODE}
      - ENFORCE_SECURE_PROFILE=${MC_ENFORCE_SECURE_PROFILE}
      - SERVER_PORT=${MC_SERVER_PORT}
      - SERVER_IP=${MC_SERVER_IP}
      - PREVENT_PROXY_CONNECTIONS=${MC_PREVENT_PROXY_CONNECTIONS}
      - ENABLE_RCON=${MC_ENABLE_RCON}
      - RCON_PORT=${MC_RCON_PORT}
      - MOTD=Hub
      - VIEW_DISTANCE=${HUB_VIEW_DISTANCE}
      - SIMULATION_DISTANCE=${HUB_SIMULATION_DISTANCE}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - ENABLE_COMMAND_BLOCK=true
      - SPAWN_PROTECTION=0
      - ALLOW_FLIGHT=true
      - PACKWIZ_URL=${SERVER_PACKWIZ_URL}
      - FABRIC_PROXY_SECRET=${VELOCITY_FORWARDING_SECRET}
      - FABRIC_PROXY_HACK_ONLINE_MODE=${FABRIC_PROXY_HACK_ONLINE_MODE}
      - FABRIC_PROXY_HACK_EARLY_SEND=${FABRIC_PROXY_HACK_EARLY_SEND}
      - FABRIC_PROXY_HACK_MESSAGE_CHAIN=${FABRIC_PROXY_HACK_MESSAGE_CHAIN}
      - FABRIC_PROXY_DISCONNECT_MESSAGE=${FABRIC_PROXY_DISCONNECT_MESSAGE}
    volumes:
      - ./data/hub:/data
    networks:
      - mc-network

  island1:
    image: itzg/minecraft-server:java17
    container_name: mc-island1
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FABRIC
      - VERSION=${MC_VERSION}
      - MEMORY=${ISLAND_MEMORY}
      - ONLINE_MODE=${MC_ONLINE_MODE}
      - ENFORCE_SECURE_PROFILE=${MC_ENFORCE_SECURE_PROFILE}
      - SERVER_PORT=${MC_SERVER_PORT}
      - SERVER_IP=${MC_SERVER_IP}
      - PREVENT_PROXY_CONNECTIONS=${MC_PREVENT_PROXY_CONNECTIONS}
      - ENABLE_RCON=${MC_ENABLE_RCON}
      - RCON_PORT=${MC_RCON_PORT}
      - MOTD=Island 1
      - VIEW_DISTANCE=${VIEW_DISTANCE}
      - SIMULATION_DISTANCE=${SIMULATION_DISTANCE}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - ENABLE_COMMAND_BLOCK=true
      - SPAWN_PROTECTION=0
      - ALLOW_FLIGHT=true
      - PACKWIZ_URL=${SERVER_PACKWIZ_URL}
      - FABRIC_PROXY_SECRET=${VELOCITY_FORWARDING_SECRET}
      - FABRIC_PROXY_HACK_ONLINE_MODE=${FABRIC_PROXY_HACK_ONLINE_MODE}
      - FABRIC_PROXY_HACK_EARLY_SEND=${FABRIC_PROXY_HACK_EARLY_SEND}
      - FABRIC_PROXY_HACK_MESSAGE_CHAIN=${FABRIC_PROXY_HACK_MESSAGE_CHAIN}
      - FABRIC_PROXY_DISCONNECT_MESSAGE=${FABRIC_PROXY_DISCONNECT_MESSAGE}
    volumes:
      - ./data/island1:/data
    networks:
      - mc-network

  island2:
    image: itzg/minecraft-server:java17
    container_name: mc-island2
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FABRIC
      - VERSION=${MC_VERSION}
      - MEMORY=${ISLAND_MEMORY}
      - ONLINE_MODE=${MC_ONLINE_MODE}
      - ENFORCE_SECURE_PROFILE=${MC_ENFORCE_SECURE_PROFILE}
      - SERVER_PORT=${MC_SERVER_PORT}
      - SERVER_IP=${MC_SERVER_IP}
      - PREVENT_PROXY_CONNECTIONS=${MC_PREVENT_PROXY_CONNECTIONS}
      - ENABLE_RCON=${MC_ENABLE_RCON}
      - RCON_PORT=${MC_RCON_PORT}
      - MOTD=Island 2
      - VIEW_DISTANCE=${VIEW_DISTANCE}
      - SIMULATION_DISTANCE=${SIMULATION_DISTANCE}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - ENABLE_COMMAND_BLOCK=true
      - SPAWN_PROTECTION=0
      - ALLOW_FLIGHT=true
      - PACKWIZ_URL=${SERVER_PACKWIZ_URL}
      - FABRIC_PROXY_SECRET=${VELOCITY_FORWARDING_SECRET}
      - FABRIC_PROXY_HACK_ONLINE_MODE=${FABRIC_PROXY_HACK_ONLINE_MODE}
      - FABRIC_PROXY_HACK_EARLY_SEND=${FABRIC_PROXY_HACK_EARLY_SEND}
      - FABRIC_PROXY_HACK_MESSAGE_CHAIN=${FABRIC_PROXY_HACK_MESSAGE_CHAIN}
      - FABRIC_PROXY_DISCONNECT_MESSAGE=${FABRIC_PROXY_DISCONNECT_MESSAGE}
    volumes:
      - ./data/island2:/data
    networks:
      - mc-network

  island3:
    image: itzg/minecraft-server:java17
    container_name: mc-island3
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FABRIC
      - VERSION=${MC_VERSION}
      - MEMORY=${ISLAND_MEMORY}
      - ONLINE_MODE=${MC_ONLINE_MODE}
      - ENFORCE_SECURE_PROFILE=${MC_ENFORCE_SECURE_PROFILE}
      - SERVER_PORT=${MC_SERVER_PORT}
      - SERVER_IP=${MC_SERVER_IP}
      - PREVENT_PROXY_CONNECTIONS=${MC_PREVENT_PROXY_CONNECTIONS}
      - ENABLE_RCON=${MC_ENABLE_RCON}
      - RCON_PORT=${MC_RCON_PORT}
      - MOTD=Island 3
      - VIEW_DISTANCE=${VIEW_DISTANCE}
      - SIMULATION_DISTANCE=${SIMULATION_DISTANCE}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - ENABLE_COMMAND_BLOCK=true
      - SPAWN_PROTECTION=0
      - ALLOW_FLIGHT=true
      - PACKWIZ_URL=${SERVER_PACKWIZ_URL}
      - FABRIC_PROXY_SECRET=${VELOCITY_FORWARDING_SECRET}
      - FABRIC_PROXY_HACK_ONLINE_MODE=${FABRIC_PROXY_HACK_ONLINE_MODE}
      - FABRIC_PROXY_HACK_EARLY_SEND=${FABRIC_PROXY_HACK_EARLY_SEND}
      - FABRIC_PROXY_HACK_MESSAGE_CHAIN=${FABRIC_PROXY_HACK_MESSAGE_CHAIN}
      - FABRIC_PROXY_DISCONNECT_MESSAGE=${FABRIC_PROXY_DISCONNECT_MESSAGE}
    volumes:
      - ./data/island3:/data
    networks:
      - mc-network

  island4:
    image: itzg/minecraft-server:java17
    container_name: mc-island4
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FABRIC
      - VERSION=${MC_VERSION}
      - MEMORY=${ISLAND_MEMORY}
      - ONLINE_MODE=${MC_ONLINE_MODE}
      - ENFORCE_SECURE_PROFILE=${MC_ENFORCE_SECURE_PROFILE}
      - SERVER_PORT=${MC_SERVER_PORT}
      - SERVER_IP=${MC_SERVER_IP}
      - PREVENT_PROXY_CONNECTIONS=${MC_PREVENT_PROXY_CONNECTIONS}
      - ENABLE_RCON=${MC_ENABLE_RCON}
      - RCON_PORT=${MC_RCON_PORT}
      - MOTD=Island 4
      - VIEW_DISTANCE=${VIEW_DISTANCE}
      - SIMULATION_DISTANCE=${SIMULATION_DISTANCE}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - ENABLE_COMMAND_BLOCK=true
      - SPAWN_PROTECTION=0
      - ALLOW_FLIGHT=true
      - PACKWIZ_URL=${SERVER_PACKWIZ_URL}
      - FABRIC_PROXY_SECRET=${VELOCITY_FORWARDING_SECRET}
      - FABRIC_PROXY_HACK_ONLINE_MODE=${FABRIC_PROXY_HACK_ONLINE_MODE}
      - FABRIC_PROXY_HACK_EARLY_SEND=${FABRIC_PROXY_HACK_EARLY_SEND}
      - FABRIC_PROXY_HACK_MESSAGE_CHAIN=${FABRIC_PROXY_HACK_MESSAGE_CHAIN}
      - FABRIC_PROXY_DISCONNECT_MESSAGE=${FABRIC_PROXY_DISCONNECT_MESSAGE}
    volumes:
      - ./data/island4:/data
    networks:
      - mc-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: mc-portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    ports:
      - "${PORTAINER_BIND_IP:-127.0.0.1}:${PORTAINER_BIND_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - mc-network

  caddy:
    image: caddy:2
    container_name: mc-caddy
    restart: unless-stopped
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      - STATUS_DOMAIN=${STATUS_DOMAIN}
      - MAP1_DOMAIN=${MAP1_DOMAIN}
      - MAP2_DOMAIN=${MAP2_DOMAIN}
      - MAP3_DOMAIN=${MAP3_DOMAIN}
      - MAP4_DOMAIN=${MAP4_DOMAIN}
      - MAP1_PORT=${MAP1_PORT}
      - MAP2_PORT=${MAP2_PORT}
      - MAP3_PORT=${MAP3_PORT}
      - MAP4_PORT=${MAP4_PORT}
      - VELOCITY_WEB_API_PORT=${VELOCITY_WEB_API_PORT}
    ports:
      - "80:80"
      - "443:443"
      - "8153:8153"
      - "8154:8154"
      - "8155:8155"
      - "8156:8156"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mc-network
    depends_on:
      - velocity

networks:
  mc-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
